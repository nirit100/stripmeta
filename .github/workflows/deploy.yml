name: Deploy-Prod

on:
  workflow_run:
    workflows: [Test]
    branches: [main]
    types: [completed]

jobs:
  deploy:
    if: github.event.workflow_run.conclusion == 'success' && !contains(github.event.workflow_run.head_commit.message, '/no-deploy')
    runs-on: ubuntu-latest
    steps:
      - run: curl -s -X POST "${{ secrets.CF_DEPLOY_HOOK }}"
